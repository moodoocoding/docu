<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학사일정 - 학교문서AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="create.css">
    <link rel="stylesheet" href="calendar.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div class="logo-icon">📋</div>
      학교문서AI
    </a>
    <nav>
      <a href="create.html?type=GONGMUN">에듀파인</a>
      <a href="create.html?type=PLAN">계획서</a>
      <a href="create.html?type=NEWSLETTER">가정통신문</a>
      <a href="create.html?type=MESSAGE">문자 답장</a>
      <a href="messenger.html">소통메신저</a>
      <a href="contacts.html">주소록</a>
      <a href="history.html">작성 내역</a>
      <div class="dropdown">
        <a href="#" class="dropbtn" class="active">개발중</a>
        <div class="dropdown-content">
          <a href="calendar.html" class="active">학사일정</a>
          <a href="create.html?type=REPORT">보고서</a>
          <a href="create.html?type=PROMOTION">보도자료</a>
        </div>
      </div>
    </nav>
    <div class="header-actions">
      <a class="header-btn" href="settings.html">학교 설정</a>
    </div>
  </div>
</header>

<main class="calendar-container">
    <section class="stats-section">
        <div class="section-title">
            <h2>&lt; 연간시수 통계표 &gt;</h2>
            <div class="semester-info">2학기 시작일: 8월 5일</div>
            
            <!-- 상단 버튼 그룹 -->
            <div class="btn-group" style="display: flex; gap: 10px; margin-left: auto;">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 파일 분석 탑재</button>
                <button class="btn btn-primary" onclick="document.getElementById('allocationModal').classList.add('show')">📊 시수 편제 설정</button>
                <button class="btn btn-primary" onclick="document.getElementById('templateModal').classList.add('show')">⚙️ 기본 시간표 설정</button>
                <input type="file" id="fileInput" style="display:none;" accept="image/*,application/pdf" onchange="window.analyzeFile && window.analyzeFile(this.files[0])">
            </div>
        </div>
        <div class="stats-table-wrapper">
            <table id="statsTable">
                <thead id="statsHeader">
                    <!-- JS에서 이중 헤더 주입 -->
                </thead>
                <tbody id="statsBody">
                    <!-- Stats rows will be injected here -->
                </tbody>
            </table>
        </div>
    </section>

    <section class="navigation-section">
        <div class="period-tabs" id="periodTabs">
            <!-- Period tabs like 3.2~4.25 will be here -->
        </div>
    </section>

    <section class="timetable-section">
        <div class="timetable-grid" id="timetableGrid">
            <!-- 8 weekly grids will be injected here -->
        </div>
    </section>
</main>

<!-- 과목 선택 모달 -->
<div class="modal-overlay" id="subjectModal">
    <div class="modal">
        <div class="modal-header">
            <h3>과목 선택</h3>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="subject-palette" id="subjectPalette">
                <!-- Subjects to choose from -->
            </div>
            <div class="custom-input">
                <input type="text" id="customSubject" placeholder="직접 입력">
                <button id="addCustomSubject">추가</button>
            </div>
        </div>
    </div>
</div>

<!-- 시수 편제 설정 모달 -->
<div class="modal-overlay" id="allocationModal">
    <div class="modal">
        <div class="modal-header">
            <h3>연간 시수 편제 설정</h3>
            <p>과목별 목표 시수(기준)를 설정합니다.</p>
        </div>
        <div class="modal-body">
            <div class="allocation-list" id="allocationList" style="max-height: 400px; overflow-y: auto;">
                <!-- 과목별 입력 필드 주입 -->
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="closeAllocation">취소</button>
            <button class="btn btn-primary" id="saveAllocation">저장하기</button>
        </div>
    </div>
</div>

<!-- 기본 주간 시간표 설정 모달 -->
<div class="modal-overlay" id="templateModal">
    <div class="modal" style="max-width: 800px;">
        <div class="modal-header">
            <h3>기본 주간 시간표 설정</h3>
            <p>설정된 과목이 연간 시간표에 일괄 적용됩니다.</p>
        </div>
        <div class="modal-body">
            <div class="template-grid-wrapper">
                <table id="templateTable">
                    <!-- Template grid -->
                </table>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="closeTemplate">취소</button>
            <button class="btn btn-primary" id="applyTemplate">일괄 적용하기</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="gemini.js"></script>
<script src="calendar.js"></script>
</body>
</html>
