<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 학교문서AI</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#f5f6fa;color:#1a1a2e;height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;padding:48px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,0.08);width:100%;max-width:440px;text-align:center;}
.logo{font-size:24px;font-weight:800;color:#1a1a2e;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;}
h1{font-size:24px;font-weight:800;margin-bottom:12px;}
p{font-size:15px;color:#666;line-height:1.6;margin-bottom:40px;}

.social-login{display:flex;flex-direction:column;gap:12px;}
.login-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;border:1.5px solid #e0e0e8;background:#fff;font-family:inherit;}
.login-btn:hover{background:#f8f9ff;border-color:#4f46e5;transform:translateY(-1px);}
.login-btn.google img{width:20px;height:20px;}

.footer{margin-top:40px;font-size:13px;color:#aaa;}
.footer a{color:#888;text-decoration:none;margin:0 8px;}
.footer a:hover{color:#4f46e5;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a2e;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    학교문서AI
  </div>
  <h1>반가워요! 👋</h1>
  <p>더 안전하고 편리한 문서 작성을 위해<br>로그인 후 서비스를 이용해 주세요.</p>

  <div class="social-login">
    <button class="login-btn google" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google 계정으로 계속하기
    </button>
  </div>

  <div class="footer">
    <a href="index.html">홈으로</a>
    <span>|</span>
    <a href="#">문의하기</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from './supabase.js';

const googleBtn = document.getElementById('googleLogin');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

googleBtn.addEventListener('click', async () => {
  try {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/index.html'
      }
    });
    if (error) throw error;
  } catch (e) {
    console.error('Login error:', e);
    showToast('❌ 로그인 중 오류가 발생했습니다: ' + e.message);
  }
});

// 이미 로그인된 경우 리다이렉트
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    window.location.href = 'index.html';
  }
});
</script>

</body>
</html>
