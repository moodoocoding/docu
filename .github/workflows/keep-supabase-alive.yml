name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 00:00 UTC (9:00 AM KST) to keep the project active
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets and Ping Supabase
        run: |
          # Clean and sanitize secrets (remove spaces, newlines, carriage returns, and quotes)
          URL=$(echo "${{ secrets.SUPABASE_URL }}" | xargs | tr -d '\r\n"')
          KEY=$(echo "${{ secrets.SUPABASE_ANON_KEY }}" | xargs | tr -d '\r\n"')
          
          # 1. Check if secrets are empty after sanitization
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::SUPABASE_URL 또는 SUPABASE_ANON_KEY 비밀값이 GitHub Secrets에 등록되지 않았거나 비어 있습니다."
            echo "리포지토리의 [Settings] > [Secrets and variables] > [Actions] 메뉴에서 비밀값들을 꼭 먼저 등록해 주세요!"
            exit 1
          fi
          
          # 2. Trim trailing slashes from URL
          URL="${URL%/}"

          
          echo "Pinging Supabase at $URL/rest/v1/messenger_analysis_history to prevent auto-pause..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$URL/rest/v1/messenger_analysis_history?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          
          echo "Supabase API returned HTTP status code: $RESPONSE"
          
          # 3. Handle results
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 400 ]; then
            echo "Ping successful! Connection verified."
          elif [ "$RESPONSE" -eq 401 ] || [ "$RESPONSE" -eq 406 ]; then
            # 401/406 means it hit the DB/PostgREST successfully but was rejected by RLS or Auth (which is perfectly normal for an anonymous keep-alive call and counts as active traffic)
            echo "Ping successful! Hitting the database endpoints counted as active DB traffic (HTTP $RESPONSE)."
          else
            echo "::error::API 호출 실패 (HTTP $RESPONSE). Supabase URL이나 Key가 올바른지 확인해 주세요."
            exit 1
          fi

